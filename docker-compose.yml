services:
  db:
    image: postgis/postgis:16-3.4
    container_name: wavefinder-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: wavefinder
      POSTGRES_PASSWORD: wavefinder
      POSTGRES_DB: wavefinder
    volumes:
      - wavefinder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wavefinder -d wavefinder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  wavefinder_pgdata:
